<div class="home">
  <div class="brand-area">
    <h1 class="brand-name">Marson <em>Psicologia</em></h1>
    <div class="brand-divider"></div>
    <p class="brand-sub">Sistema de Anamnese Neuropsicológica</p>
  </div>

  <div class="home-cards">
    <div class="access-card patient" (click)="goPatient()">
      <span class="card-icon">🧠</span>
      <div class="card-title">Acesso Paciente</div>
      <div class="card-desc">Responda o formulário de anamnese</div>
    </div>
    <div class="access-card psych" (click)="goPsych()">
      <span class="card-icon">🩺</span>
      <div class="card-title">Acesso Psicólogo</div>
      <div class="card-desc">Gerencie perguntas e visualize respostas</div>
    </div>
  </div>
</div>

<div class="layout">
  <div class="page-header">
    <button class="back-btn" (click)="goBack()">←</button>
    <div class="page-title">
      <span>Psicólogo</span>
      Cadastro de Paciente
    </div>
    <div class="header-logo">Marson Psicologia</div>
  </div>

  <div class="register-box">
    <h4>Dados do Paciente</h4>
    <p class="register-desc">Preencha os dados para gerar o código de acesso.</p>

    <div class="form-grid">
      <!-- Nome: Obrigatório -->
      <div class="form-group">
        <label class="field-label">Nome completo *</label>
        <input
          type="text"
          class="field-input"
          placeholder="Nome do paciente"
          [(ngModel)]="patientName"
        />
      </div>

      <div class="form-row">
        <!-- Escolaridade: Obrigatório -->
        <div class="form-group">
          <label class="field-label">Escolaridade *</label>
          <select class="field-input" [(ngModel)]="education">
            <option value="">Selecione...</option>
            <option value="Fundamental">Fundamental</option>
            <option value="Médio">Médio</option>
            <option value="Superior">Superior</option>
            <option value="Pós-graduação">Pós-graduação</option>
          </select>
        </div>
        <!-- Nascimento: Obrigatório -->
        <div class="form-group">
          <label class="field-label">Data de Nascimento *</label>
          <input
            type="date"
            class="field-input"
            [(ngModel)]="birthDate"
          />
        </div>
      </div>

      <!-- Seletor de Responsável Legal: Decisivo para a lógica -->
      <div class="form-group">
        <label class="field-label">O paciente requer um Responsável Legal? *</label>
        <div style="display: flex; gap: 10px; margin-top: 5px;">
          <button 
            type="button"
            class="btn" 
            [class.btn-primary]="isMinor()" 
            (click)="isMinor.set(true)">Sim (Menor / PCD / Tutor)</button>
          <button 
            type="button"
            class="btn" 
            [class.btn-primary]="!isMinor()" 
            (click)="isMinor.set(false)">Não (Autônomo)</button>
        </div>
      </div>

      <!-- Campo Dinâmico: Só aparece se precisar de responsável -->
      <div class="form-group" *ngIf="isMinor()">
        <label class="field-label">Nome do Responsável Legal *</label>
        <input
          type="text"
          class="field-input"
          placeholder="Nome completo do tutor, pai ou mãe"
          [(ngModel)]="guardianName"
        />
      </div>

      <div class="form-group">
        <label class="field-label">Endereço</label>
        <input
          type="text"
          class="field-input"
          placeholder="Endereço completo (Opcional)"
          [(ngModel)]="address"
        />
      </div>

      <!-- Motivo: Obrigatório -->
      <div class="form-group">
        <label class="field-label">Motivo do atendimento *</label>
        <textarea
          class="field-input"
          placeholder="Descreva o motivo pelo qual o paciente busca atendimento..."
          rows="3"
          [(ngModel)]="reason"
        ></textarea>
      </div>
    </div>

    <!-- Botão com Validação: Fica cinza se faltar algo obrigatório -->
    <div class="form-actions">
      <button 
        class="btn btn-primary" 
        (click)="createPatient()"
        [disabled]="!patientName() || !education() || !birthDate() || !reason() || (isMinor() && !guardianName())"
      >
        Cadastrar e Gerar Código
      </button>
    </div>

    <!-- Display de código gerado -->
    <div class="generated-code-box" *ngIf="generatedCode()">
      <div class="code-label">Código de acesso do paciente:</div>
      <div class="code-value" (click)="copyCode(generatedCode()!)">
        {{ generatedCode() }}
        <span class="copy-hint">📋 Copiar</span>
      </div>
      <div class="code-actions">
        <button class="btn btn-primary" (click)="goToPatients()">Ver Pacientes</button>
      </div>
    </div>
  </div>
</div>
